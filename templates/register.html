<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - RAG Automation</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-header">
        <a href="/" class="auth-logo">🤖 RAG Automation</a>
        <h1>Create your account</h1>
        <p>Start building AI chatbots today</p>
      </div>
      <div class="card">
        <form action="/api/register" method="post">
          <div class="form-group">
            <label class="label">Name</label>
            <input type="text" name="name" class="input" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label class="label">Email</label>
            <input type="email" name="email" class="input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="label">Password</label>
            <input type="password" name="password" class="input" placeholder="••••••••" minlength="6" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
      </div>
    </div>
  </div>
</body>
</html>
