<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RAG Automation</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-box">
      <div class="auth-header">
        <a href="/" class="auth-logo">🤖 RAG Automation</a>
        <h1>Welcome back</h1>
        <p>Sign in to your account</p>
      </div>
      <div class="card">
        <form action="/api/login" method="post">
          <div class="form-group">
            <label class="label">Email</label>
            <input type="email" name="email" class="input" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="label">Password</label>
            <input type="password" name="password" class="input" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="/register">Sign up</a></p>
      </div>
    </div>
  </div>
</body>
</html>
