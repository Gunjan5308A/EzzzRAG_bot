<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ bot.name }} - RAG Automation</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  {% include "partials/nav.html" %}
  <div class="layout">
    {% include "partials/sidebar.html" %}
    <main class="main">
      <h1 class="page-title">{{ bot.name }}</h1>
      <p class="page-sub">Slug: <code>{{ bot.slug }}</code> · Chat URL: <a href="/chat/{{ bot.slug }}" target="_blank">/chat/{{ bot.slug }}</a></p>

      <div class="tabs">
        <button class="tab active" onclick="showTab('settings',this)">Settings</button>
        <button class="tab" onclick="showTab('docs',this)">Documents</button>
        <button class="tab" onclick="showTab('ctx',this)">Contexts</button>
      </div>

      <div id="tab-settings" class="tab-panel active">
        <div class="card" style="max-width:32rem">
          <form action="/api/chatbots/{{ bot.id }}/update" method="post">
            <div class="form-group">
              <label class="label">Name</label>
              <input type="text" name="name" class="input" value="{{ bot.name }}" required>
            </div>
            <div class="form-group">
              <label class="label">Description</label>
              <input type="text" name="description" class="input" value="{{ bot.description or '' }}">
            </div>
            <div class="form-group">
              <label class="label">System Prompt</label>
              <textarea name="system_prompt" class="input" rows="3">{{ bot.system_prompt or '' }}</textarea>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label class="label">Model</label>
                <select name="model" class="input">
                  <option value="gpt-4o-mini" {{ 'selected' if bot.model=='gpt-4o-mini' }}>GPT-4o Mini</option>
                  <option value="gpt-4o" {{ 'selected' if bot.model=='gpt-4o' }}>GPT-4o</option>
                </select>
              </div>
              <div class="form-group">
                <label class="label">Temperature</label>
                <input type="number" name="temperature" class="input" value="{{ bot.temperature }}" min="0" max="2" step="0.1">
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label class="label">Theme Color</label>
                <input type="color" name="theme_color" class="input" value="{{ bot.theme_color }}" style="height:2.5rem;padding:0.25rem">
              </div>
              <div class="form-group" style="display:flex;align-items:end">
                <label class="check-label">
                  <input type="checkbox" name="is_active" {{ 'checked' if bot.is_active }}>
                  <span>Active</span>
                </label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">Save Changes</button>
          </form>
        </div>
      </div>

      <div id="tab-docs" class="tab-panel">
        <div class="card" style="max-width:40rem">
          <h3 style="margin-bottom:1rem">Upload Document</h3>
          <form action="/api/chatbots/{{ bot.id }}/documents" method="post" enctype="multipart/form-data" class="upload-form">
            <label class="file-drop" id="drop-zone">
              <input type="file" name="file" accept=".pdf,.txt,.md,.csv,.docx" hidden onchange="this.form.submit()">
              <p>Click to upload or drag file here</p>
              <p class="muted">PDF, TXT, MD, CSV, DOCX</p>
            </label>
          </form>
          <div id="doc-list" style="margin-top:1rem">Loading...</div>
        </div>
      </div>

      <div id="tab-ctx" class="tab-panel">
        <div class="card" style="max-width:40rem">
          <h3 style="margin-bottom:1rem">Add Custom Context</h3>
          <form action="/api/chatbots/{{ bot.id }}/contexts" method="post">
            <div class="grid-2">
              <div class="form-group">
                <label class="label">Name</label>
                <input type="text" name="name" class="input" placeholder="e.g. FAQ" required>
              </div>
              <div class="form-group">
                <label class="label">Priority</label>
                <input type="number" name="priority" class="input" value="0">
              </div>
            </div>
            <div class="form-group">
              <label class="label">Content</label>
              <textarea name="content" class="input" rows="3" placeholder="Your context text..." required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Add Context</button>
          </form>
          <div id="ctx-list" style="margin-top:1rem">Loading...</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function showTab(name, btn) {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-'+name).classList.add('active');
    }

    // Load documents
    fetch('/api/chatbots').then(r=>r.json()).then(bots=>{
      const bot = bots.find(b=>b.id=={{ bot.id }});
      if(!bot) return;
    });

    (async()=>{
      const res = await fetch('/api/chatbots');
      const bots = await res.json();
      const bot = bots.find(b=>b.id=={{ bot.id }});

      // We need a different approach - load docs and ctx via page context
    })();

    // Simple fetch for docs and contexts using a helper endpoint
    fetch('/api/chatbots/{{ bot.id }}/documents').then(r=>r.json()).then(docs=>{
      const el = document.getElementById('doc-list');
      if(!docs.length){ el.innerHTML='<p class="muted">No documents yet.</p>'; return; }
      el.innerHTML = '<table class="table"><thead><tr><th>File</th><th>Status</th><th>Chunks</th><th></th></tr></thead><tbody>'+
        docs.map(d=>`<tr><td>${d.filename}</td><td><span class="badge badge-green">${d.status}</span></td><td>${d.chunk_count}</td>
        <td><form action="/api/chatbots/{{ bot.id }}/documents/${d.id}/delete" method="post" style="display:inline" onsubmit="return confirm('Delete?')"><button class="btn btn-danger btn-sm">Delete</button></form></td></tr>`).join('')+
        '</tbody></table>';
    }).catch(()=>{ document.getElementById('doc-list').innerHTML='<p class="muted">No documents yet.</p>'; });

    fetch('/api/chatbots/{{ bot.id }}/contexts').then(r=>r.json()).then(ctxs=>{
      const el = document.getElementById('ctx-list');
      if(!ctxs.length){ el.innerHTML='<p class="muted">No contexts yet.</p>'; return; }
      el.innerHTML = ctxs.map(c=>`
        <div class="list-item" style="flex-direction:column;align-items:stretch;gap:0.5rem">
          <div style="display:flex;justify-content:space-between"><strong>${c.name}</strong> <span class="muted">priority ${c.priority}</span></div>
          <p class="muted" style="white-space:pre-wrap">${c.content}</p>
          <form action="/api/chatbots/{{ bot.id }}/contexts/${c.id}/delete" method="post" onsubmit="return confirm('Delete?')"><button class="btn btn-danger btn-sm">Delete</button></form>
        </div>`).join('');
    }).catch(()=>{ document.getElementById('ctx-list').innerHTML='<p class="muted">No contexts yet.</p>'; });
  </script>
</body>
</html>
