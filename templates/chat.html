<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - {{ bot.name }}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f3f4f6}
    .chat-window{width:400px;height:600px;background:#fff;border-radius:1rem;box-shadow:0 25px 50px rgba(0,0,0,.15);display:flex;flex-direction:column;overflow:hidden}
    .chat-header{background:{{ bot.theme_color }};color:#fff;padding:1rem;display:flex;align-items:center;gap:.75rem}
    .chat-avatar{width:2.5rem;height:2.5rem;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.25rem}
    #messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.75rem;background:#f9fafb}
    .msg{display:flex}.msg-user{justify-content:flex-end}.msg-bot{justify-content:flex-start}
    .bubble{max-width:80%;padding:.75rem 1rem;border-radius:1rem;font-size:.875rem;line-height:1.5}
    .msg-user .bubble{background:{{ bot.theme_color }};color:#fff;border-bottom-right-radius:.25rem}
    .msg-bot .bubble{background:#fff;color:#1f2937;border:1px solid #e5e7eb;border-bottom-left-radius:.25rem}
    #chat-form{display:flex;gap:.5rem;padding:.75rem;border-top:1px solid #e5e7eb}
    #chat-input{flex:1;border:1px solid #e5e7eb;border-radius:2rem;padding:.625rem 1rem;font-size:.875rem;outline:none}
    #chat-input:focus{border-color:{{ bot.theme_color }}}
    #send-btn{width:2.5rem;height:2.5rem;border-radius:50%;background:{{ bot.theme_color }};color:#fff;border:none;cursor:pointer;font-size:1rem}
  </style>
</head>
<body>
  <div class="chat-window">
    <div class="chat-header">
      <div class="chat-avatar">🤖</div>
      <div><h3>{{ bot.name }}</h3><p style="font-size:.75rem;opacity:.8">Usually replies instantly</p></div>
    </div>
    <div id="messages"></div>
    <form id="chat-form" onsubmit="sendMsg(event)">
      <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
      <button type="submit" id="send-btn">→</button>
    </form>
  </div>

  <script>
    const slug = '{{ bot.slug }}';
    const welcome = '{{ bot.system_prompt|default("Hello! How can I help you today?", true)|e }}';
    const msgs = document.getElementById('messages');
    let convId = '';

    function addMsg(role, text) {
      const d = document.createElement('div');
      d.className = 'msg msg-' + (role==='user'?'user':'bot');
      d.innerHTML = '<div class="bubble">' + text.replace(/</g,'&lt;').replace(/\n/g,'<br>') + '</div>';
      msgs.appendChild(d);
      msgs.scrollTop = msgs.scrollHeight;
    }

    addMsg('assistant', welcome.split('\n')[0] || 'Hello! How can I help you today?');

    async function sendMsg(e) {
      e.preventDefault();
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      addMsg('user', text);

      const fd = new FormData();
      fd.append('message', text);
      fd.append('conversation_id', convId);

      try {
        const res = await fetch('/api/chat/' + slug, { method: 'POST', body: fd });
        const data = await res.json();
        convId = data.conversation_id;
        addMsg('assistant', data.response);
      } catch {
        addMsg('assistant', 'Sorry, something went wrong.');
      }
    }
  </script>
</body>
</html>
