<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Chatbot - RAG Automation</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  {% include "partials/nav.html" %}
  <div class="layout">
    {% include "partials/sidebar.html" %}
    <main class="main">
      <h1 class="page-title">Create Chatbot</h1>
      <p class="page-sub">Set up a new AI chatbot</p>

      <div class="card" style="max-width:32rem">
        <form action="/api/chatbots" method="post">
          <div class="form-group">
            <label class="label">Name *</label>
            <input type="text" name="name" class="input" placeholder="e.g. Customer Support" required>
          </div>
          <div class="form-group">
            <label class="label">Description</label>
            <input type="text" name="description" class="input" placeholder="What does it do?">
          </div>
          <div class="form-group">
            <label class="label">System Prompt</label>
            <textarea name="system_prompt" class="input" rows="3" placeholder="Instructions for the chatbot..."></textarea>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label class="label">Model</label>
              <select name="model" class="input">
                <option value="gpt-4o-mini">GPT-4o Mini</option>
                <option value="gpt-4o">GPT-4o</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label">Temperature</label>
              <input type="number" name="temperature" class="input" value="0.7" min="0" max="2" step="0.1">
            </div>
          </div>
          <div class="form-group">
            <label class="label">Theme Color</label>
            <input type="color" name="theme_color" class="input" value="#2563eb" style="height:2.5rem;padding:0.25rem">
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Chatbot</button>
            <a href="/chatbots" class="btn btn-ghost">Cancel</a>
          </div>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
